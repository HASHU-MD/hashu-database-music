<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My School Marks</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333;
            --accent-color: #4a90e2;
            --shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        [data-theme="dark"] {
            --bg-color: #1a1a2e;
            --card-bg: #16213e;
            --text-color: #e9ecef;
            --accent-color: #00d2ff;
            --shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: all 0.3s ease;
            margin: 0;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 20px;
            border: none;
            background: var(--accent-color);
            color: white;
            font-weight: bold;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .subject-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            box-shadow: var(--shadow);
            text-align: center;
            transition: transform 0.2s;
            border-left: 5px solid var(--accent-color);
        }

        .subject-card:hover {
            transform: translateY(-5px);
        }

        .subject-name {
            font-size: 1.2rem;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .marks {
            font-size: 2.5rem;
            color: var(--accent-color);
            font-weight: 800;
        }

        .grade {
            display: block;
            margin-top: 5px;
            font-weight: bold;
            color: #27ae60;
        }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()">Change Theme</button>

    <div class="header">
        <h1>වාර පරීක්ෂණ ලකුණු සටහන</h1>
        <p>මගේ විෂයන් 9යේ දක්ෂතා</p>
    </div>

    <div class="container">
        <div class="subject-card">
            <div class="subject-name">බුද්ධ ධර්මය</div>
            <div class="marks">85</div>
            <span class="grade">Grade: A</span>
        </div>

        <div class="subject-card">
            <div class="subject-name">සිංහල</div>
            <div class="marks">78</div>
            <span class="grade">Grade: A</span>
        </div>

        <div class="subject-card">
            <div class="subject-name">ගණිතය</div>
            <div class="marks">92</div>
            <span class="grade">Grade: A</span>
        </div>

        <div class="subject-card">
            <div class="subject-name">විද්‍යාව</div>
            <div class="marks">80</div>
            <span class="grade">Grade: A</span>
        </div>

        <div class="subject-card">
            <div class="subject-name">ඉතිහාසය</div>
            <div class="marks">65</div>
            <span class="grade">Grade: B</span>
        </div>

        <div class="subject-card">
            <div class="subject-name">ඉංග්‍රීසි</div>
            <div class="marks">72</div>
            <span class="grade">Grade: B</span>
        </div>

        <div class="subject-card">
            <div class="subject-name">භූගෝල විද්‍යාව</div>
            <div class="marks">88</div>
            <span class="grade">Grade: A</span>
        </div>

        <div class="subject-card">
            <div class="subject-name">තොරතුරු තාක්ෂණය</div>
            <div class="marks">95</div>
            <span class="grade">Grade: A</span>
        </div>

        <div class="subject-card">
            <div class="subject-name">කලාව</div>
            <div class="marks">70</div>
            <span class="grade">Grade: B</span>
        </div>
    </div>

    <script>
        function toggleTheme() {
            const body = document.body;
            if (body.getAttribute('data-theme') === 'dark') {
                body.removeAttribute('data-theme');
            } else {
                body.setAttribute('data-theme', 'dark');
            }
        }
    </script>
</body>
</html>
